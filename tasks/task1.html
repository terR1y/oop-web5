<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>завдання 1</title>
    <link rel="stylesheet" href="../style.css" />
  </head>
  <body>
    <header class="_header _header-1">
      <a href="../index.html"
        ><img src="../img/icon/arrow-icon.png" alt="arrow icon"
      /></a>
    </header>
    <main class="_main _main-task1">
      <form action="form_sent.html" method="get">
        <table>
          <caption>
            реєстрація
          </caption>
          <tr>
            <th><h3>e-mail:</h3></th>
            <td><input type="email" required placeholder="your email" /></td>
          </tr>
          <tr>
            <th><h3>пароль:</h3></th>
            <td>
              <input type="password" required placeholder="your password" />
            </td>
          </tr>
          <tr>
            <th><h3>повторіть пароль:</h3></th>
            <td>
              <input type="password" required placeholder="confirm password" />
            </td>
          </tr>

          <tr>
            <th><h3>ім'я:</h3></th>
            <td><input type="text" required placeholder="your name" /></td>
          </tr>
          <tr>
            <th><h3>прізвище:</h3></th>
            <td><input type="text" required placeholder="your surname" /></td>
          </tr>
          <tr>
            <th><h3>стать:</h3></th>
            <td class="gender-pool">
              <input
                type="radio"
                name="gender"
                id="woman"
                value="woman"
                checked
              />
              <label for="woman">жінка</label>

              <input type="radio" name="gender" id="man" value="man" />
              <label for="man">чоловік</label>

              <input type="radio" name="gender" id="other" value="other" />
              <label for="other">інше</label>
            </td>
          </tr>

          <tr>
            <th><h3>вкажіть місто:</h3></th>
            <td>
              <select name="citys" required>
                <option value="" disabled selected hidden>--</option>
                <option value="Zaporizhia">Запоріжжя</option>
                <option value="Zhytomyr">Житомир</option>
                <option value="Vinnytsia">Вінниця</option>
                <option value="Khmelnytskyi">Хмельницький</option>
                <option value="Ivano-Frankivsk">Івано-Франківськ</option>
                <option value="Odessa">Одесса</option>
                <option value="Chernihiv">Чернігів</option>
                <option value="Rivne">Рівне</option>
              </select>
            </td>
          </tr>
          <tr>
            <th><h3>про себе:</h3></th>
            <td>
              <textarea
                name="about_user"
                id="about"
                placeholder="tell us something about yourself..."
              ></textarea>
            </td>
          </tr>

          <tr>
            <th><h3>погодження:</h3></th>
            <td>
              <label for="newsletter">
                <input type="checkbox" checked />отримувати розсилку з сайту
                <br
              /></label>
              <label for="rules">
                <input type="checkbox" checked />погоджуватися з правилами сайту
                <br
              /></label>
              <label for="private">
                <input type="checkbox" />приховувати профіль на сайті <br
              /></label>
            </td>
          </tr>
        </table>
        <button type="reset">очистити</button>
        <button type="submit">надіслати</button>
      </form>
    </main>
  </body>
</html>
